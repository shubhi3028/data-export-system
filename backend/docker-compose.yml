version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: export_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: export_db
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: export_api
    environment:
      DATABASE_URL: "postgres://user:password@postgres:5432/export_db?sslmode=disable"
      PORT: "8080"
      EXPORT_DIR: "./exports"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: export_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
